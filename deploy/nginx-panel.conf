# Reverse-proxy + HTTPS for the P2P admin panel.
# The bot binds the panel to 127.0.0.1:8088; nginx is the only thing public.
# Get a cert with: certbot --nginx -d panel.yourdomain.com
#
# Strongly recommended: restrict to your own IP(s). Uncomment the allow/deny
# lines and set your address. The panel can change the bot token and admins,
# so treat it like a bank login.

server {
    listen 443 ssl;
    server_name panel.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/panel.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.yourdomain.com/privkey.pem;

    # allow 203.0.113.10;   # <- your office/home IP
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name panel.yourdomain.com;
    return 301 https://$host$request_uri;
}
